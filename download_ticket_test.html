<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download Ticket</title>
</head>
<body>
    <h2>Download Event Ticket</h2>

    <label>Registration ID: </label>
    <input type="text" id="registrationId" placeholder="Enter registration ID">
    <br><br>

    <label>Bearer Token: </label>
    <input type="text" id="token" placeholder="Enter your token">
    <br><br>

    <button id="downloadBtn">Download Ticket</button>

    <script>
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const registrationId = document.getElementById('registrationId').value.trim();
            const token = document.getElementById('token').value.trim();

            if (!registrationId || !token) {
                alert('Please enter both Registration ID and Bearer Token!');
                return;
            }

            const url = `http://127.0.0.1:8008/api/event-registration/${registrationId}/ticket`;

            fetch(url, {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Failed to fetch ticket');
                return response.blob();
            })
            .then(blob => {
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `ticket_${registrationId}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
            })
            .catch(error => {
                alert(error.message);
            });
        });
    </script>
</body>
</html>
